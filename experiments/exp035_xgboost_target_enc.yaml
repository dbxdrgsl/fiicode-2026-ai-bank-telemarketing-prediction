# exp035: XGBoost with target encoding  
# Hypothesis: Third GBM family for maximum ensemble diversity
name: exp035_xgboost_target_enc
model: xgboost
feature_set: blend_buckets_target_enc
notes: "XGBoost for 3-way GBM ensemble potential"

search:
  n_trials: 50
  timeout_minutes: 90

search_space:
  n_estimators: [600, 1000]
  max_depth: [6, 10]
  learning_rate: [0.02, 0.08]
  min_child_weight: [1, 10]
  gamma: [0.0, 0.3]
  subsample: [0.7, 0.9]
  colsample_bytree: [0.7, 0.9]
  reg_alpha: [0.0, 0.5]
  reg_lambda: [0.0, 0.5]

cv:
  n_splits: 5
  shuffle: true

final:
  seeds: [42, 2024, 3407]
