name: exp037_gpu_fttransformer_deep
competition_slug: fiicode-2026-ai-competition
feature_set: blend_buckets_catfreq
drop_columns: []
data_dir: data/raw
output_root: outputs
require_cuda: true
deterministic: false
cv_folds: 5
cv_seed: 42
notes: >
  Deeper FT-Transformer variant on catfreq feature set for architecture-driven
  diversity compared to attention/tabresnet.

models:
  - name: exp037_fttransformer_deep_gpu
    family: ft_transformer
    seeds: [42, 2024, 3407, 1337, 1001]
    epochs: 90
    batch_size: 1024
    lr: 0.0008
    weight_decay: 0.01
    patience: 14
    max_grad_norm: 1.0
    num_workers: 0
    amp: true
    model_params:
      token_dim: 192
      n_layers: 6
      heads: 8
      ff_mult: 4
      dropout: 0.2
