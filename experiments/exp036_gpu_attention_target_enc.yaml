name: exp036_gpu_attention_target_enc
competition_slug: fiicode-2026-ai-competition
feature_set: blend_buckets_target_enc
drop_columns: []
data_dir: data/raw
output_root: outputs
require_cuda: true
deterministic: false
cv_folds: 5
cv_seed: 42
notes: >
  Attention model with leakage-safe target encoded features. This isolates
  feature-set shift impact versus exp026 attention baseline.

models:
  - name: exp036_attention_target_enc_gpu
    family: attention
    seeds: [42, 2024, 3407, 777, 1337]
    epochs: 90
    batch_size: 1024
    lr: 0.001
    weight_decay: 0.01
    patience: 14
    max_grad_norm: 1.0
    num_workers: 0
    amp: true
    model_params:
      emb_dim: 24
      hidden_dim: 192
      n_layers: 4
      heads: 6
      dropout: 0.2
