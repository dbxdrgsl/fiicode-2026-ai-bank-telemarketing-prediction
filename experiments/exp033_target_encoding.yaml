# exp033: Target encoding - fundamentally new feature type
# Hypothesis: Smoothed target encoding captures category-target relationships CatBoost might miss
name: exp033_target_encoding
model: catboost
feature_set: blend_buckets_target_enc
notes: "Target encoding with smoothing=10, noise=0.01 - structural change from pure frequency"

search:
  n_trials: 60
  timeout_minutes: 120

search_space:
  iterations: [800, 1200]
  depth: [6, 8]
  learning_rate: [0.03, 0.08]
  l2_leaf_reg: [3, 7]
  random_strength: [0.5, 2.0]
  bagging_temperature: [0.5, 1.5]
  border_count: [128, 254]

cv:
  n_splits: 5
  shuffle: true

final:
  seeds: [42, 2024, 3407]
