name: exp026_gpu_nn_optimized
competition_slug: fiicode-2026-ai-competition
feature_set: blend_buckets
drop_columns: []
data_dir: data/raw
output_root: outputs
require_cuda: true
deterministic: false
cv_folds: 5
cv_seed: 42
notes: >
  Optimized follow-up to exp025 after early-run analysis:
  keep strongest attention path, prune weak heavy models, and add a lighter FT branch.

models:
  - name: exp026_attention_gpu
    family: attention
    seeds: [42, 2024, 3407, 777, 1337, 1001, 2718]
    epochs: 90
    batch_size: 1024
    lr: 0.001
    weight_decay: 0.01
    patience: 16
    max_grad_norm: 1.0
    num_workers: 0
    amp: true
    model_params:
      emb_dim: 24
      hidden_dim: 192
      n_layers: 4
      heads: 6
      dropout: 0.2

  - name: exp026_fttransformer_lite_gpu
    family: ft_transformer
    seeds: [42, 2024, 3407]
    epochs: 80
    batch_size: 1024
    lr: 0.001
    weight_decay: 0.008
    patience: 12
    max_grad_norm: 1.0
    num_workers: 0
    amp: true
    model_params:
      token_dim: 128
      n_layers: 4
      heads: 8
      ff_mult: 2
      dropout: 0.15

blend:
  enabled: true
  name: exp026_gpu_nn_blend
  samples: 12000
  seed: 42
  min_improvement: 0.0
  max_models: 2
